on:
  workflow_dispatch:
  push:
    branches: [ main ]

name: Build
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build with dotnet
        run: dotnet build LearnOpenTK.slnx --configuration Release